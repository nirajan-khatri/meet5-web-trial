<div class="app-layout">
  <app-sidebar></app-sidebar>
  <main class="main-content">
    <header class="top-bar">
      <!-- Logo (mobile only, shown via CSS at ≤768px) -->
      <a routerLink="/activities" class="header-logo" aria-label="Meet5 Home">
        <span class="header-logo-text">m<span class="header-logo-accent">5</span></span>
      </a>

      <!-- Search bar -->
      <div class="search-bar">
        <span class="mat-icon search-bar-icon" aria-hidden="true">search</span>
        <input
          type="text"
          class="search-input"
          placeholder="Search activities..."
          aria-label="Search activities"
        />
      </div>

      <!-- Right actions -->
      <div class="actions">
        <button class="btn-create-event" aria-label="Create Activity">
          <span class="mat-icon btn-icon" aria-hidden="true">add</span>
          <span class="btn-text">Create Activity</span>
        </button>

        <button class="icon-button" aria-label="Filter">
          <span class="mat-icon">tune</span>
        </button>

        <button class="icon-button notification-btn" aria-label="Notifications">
          <span class="mat-icon">notifications</span>
          <span class="notification-badge" aria-label="3 unread notifications">3</span>
        </button>

        <button class="avatar-btn" aria-label="Your profile" routerLink="/profile">
          <img
            class="avatar-img"
            src="https://i.pravatar.cc/150?img=12"
            alt="Your profile"
            loading="lazy"
          />
        </button>
      </div>
    </header>
    <div class="content-container">
      <router-outlet></router-outlet>
    </div>
  </main>

  <!-- Bottom Tab Bar (mobile only, shown via CSS at ≤768px) -->
  <nav class="bottom-tab-bar" aria-label="Mobile navigation">
    <a routerLink="/activities" routerLinkActive="active" class="tab-item" aria-label="Activities">
      <span class="mat-icon tab-icon">local_activity</span>
      <span class="tab-label">Activities</span>
    </a>
    <a routerLink="/for-me" routerLinkActive="active" class="tab-item" aria-label="For me">
      <span class="mat-icon tab-icon">star</span>
      <span class="tab-label">For me</span>
    </a>
    <a routerLink="/discover" routerLinkActive="active" class="tab-item" aria-label="Discover">
      <span class="mat-icon tab-icon">explore</span>
      <span class="tab-label">Discover</span>
    </a>
    <a routerLink="/chats" routerLinkActive="active" class="tab-item" aria-label="Chats">
      <span class="mat-icon tab-icon">chat_bubble</span>
      <span class="tab-label">Chats</span>
      <span class="tab-badge" aria-label="2 unread messages">2</span>
    </a>
    <a routerLink="/profile" routerLinkActive="active" class="tab-item" aria-label="Profile">
      <span class="mat-icon tab-icon">person</span>
      <span class="tab-label">Profile</span>
    </a>
  </nav>
</div>
